<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>My Orders - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h4 class="mb-3">My Orders</h4>

    <!-- Flash messages -->
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${param.success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty state -->
    <div th:if="${orders.empty}" class="alert alert-info">
        You haven't placed any orders yet.
        <a th:href="@{/customer/dashboard}" class="alert-link">Browse products</a> to get started!
    </div>

    <!-- Orders table -->
    <div th:if="${!orders.empty}" class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-success">
                <tr>
                    <th>#</th>
                    <th>Product</th>
                    <th>Seller</th>
                    <th>Qty</th>
                    <th>Total (&#8377;)</th>
                    <th>Delivery Address</th>
                    <th>Contact</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order, stat : ${orders}">
                    <td th:text="${stat.count}"></td>
                    <td>
                        <strong th:text="${order.product.name}"></strong>
                    </td>
                    <td th:text="${order.seller.username}"></td>
                    <td th:text="${order.quantity}"></td>
                    <td th:text="${order.totalPrice}"></td>
                    <td th:text="${order.deliveryAddress}"></td>
                    <td th:text="${order.contactNumber}"></td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
                    <td>
                        <span th:if="${order.status.name() == 'DELIVERED'}"
                              class="badge bg-success">Delivered</span>
                        <span th:if="${order.status.name() == 'PENDING'}"
                              class="badge bg-warning text-dark">Pending</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
