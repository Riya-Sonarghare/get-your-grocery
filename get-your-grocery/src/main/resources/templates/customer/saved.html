<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Saved Items - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h4 class="mb-3">&#9825; Saved Items</h4>

    <!-- Empty state -->
    <div th:if="${savedItems.empty}" class="alert alert-info">
        You haven't saved any items yet.
        <a th:href="@{/customer/dashboard}" class="alert-link">Browse products</a> and hit Save!
    </div>

    <!-- Saved product cards -->
    <div class="row row-cols-1 row-cols-md-3 g-4" th:if="${!savedItems.empty}">

        <div class="col" th:each="item : ${savedItems}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">

                    <h5 class="card-title" th:text="${item.product.name}"></h5>
                    <p class="card-text text-muted small"
                       th:text="${item.product.description != null ? item.product.description : 'No description'}">
                    </p>

                    <table class="table table-sm table-borderless mb-0">
                        <tr>
                            <td class="text-muted">Price</td>
                            <td>
                                <strong class="text-success">
                                    &#8377;<span th:text="${item.product.price}"></span>
                                </strong>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted">Category</td>
                            <td th:text="${item.product.category != null ? item.product.category : '—'}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Seller</td>
                            <td th:text="${item.product.seller.username}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Stock</td>
                            <td th:text="${item.product.stockQuantity} + ' units'"></td>
                        </tr>
                    </table>

                </div>

                <div class="card-footer d-flex gap-2">
                    <a th:href="@{/customer/checkout/{id}(id=${item.product.id})}"
                       class="btn btn-success btn-sm">Order Now</a>

                    <form th:action="@{/customer/saved/remove/{id}(id=${item.id})}"
                          method="post"
                          onsubmit="return confirm('Remove this saved item?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Remove</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
