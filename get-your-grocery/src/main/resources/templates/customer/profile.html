<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>My Profile - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">My Profile</h5>
                </div>
                <div class="card-body p-4">

                    <!-- Flash messages -->
                    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
                        <span th:text="${param.success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
                        <span th:text="${param.error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form method="post" th:action="@{/customer/profile/update}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control bg-light"
                                   th:value="${customer.username}" disabled/>
                            <div class="form-text">Username cannot be changed.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="text" class="form-control bg-light"
                                   th:value="${customer.email}" disabled/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Address</label>
                            <input type="text" name="address" class="form-control"
                                   th:value="${customer.address}"
                                   placeholder="Your delivery address"/>
                            <div class="form-text">
                                This will be auto-filled in the checkout form.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contact Number</label>
                            <input type="text" name="contactNumber" class="form-control"
                                   th:value="${customer.contactNumber}"
                                   placeholder="Your phone number"/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                New Password
                                <small class="text-muted fw-normal">(leave blank to keep current)</small>
                            </label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="New password"/>
                        </div>

                        <button type="submit" class="btn btn-success">Save Changes</button>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
