<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Add Product - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Add New Product</h5>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form method="post" th:action="@{/seller/products/add}" th:object="${productDto}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   placeholder="e.g. Fresh Tomatoes" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                      placeholder="Brief description of the product"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Price (&#8377;) <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" min="0.01" th:field="*{price}"
                                       class="form-control" placeholder="0.00" required/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Stock Quantity <span class="text-danger">*</span></label>
                                <input type="number" min="0" th:field="*{stockQuantity}"
                                       class="form-control" placeholder="0" required/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Category</label>
                            <input type="text" th:field="*{category}" class="form-control"
                                   placeholder="e.g. Vegetables, Fruits, Dairy"/>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Add Product</button>
                            <a th:href="@{/seller/dashboard}" class="btn btn-secondary">Cancel</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
