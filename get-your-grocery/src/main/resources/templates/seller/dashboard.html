<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>My Products - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <!-- Page heading -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">My Products</h4>
        <a th:href="@{/seller/products/add}" class="btn btn-success">+ Add Product</a>
    </div>

    <!-- Success / error flash messages -->
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${param.success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty state -->
    <div th:if="${products.empty}" class="alert alert-info">
        You have no products yet. Click <strong>+ Add Product</strong> to get started.
    </div>

    <!-- Products table -->
    <div th:if="${!products.empty}">
        <table class="table table-bordered table-hover table-striped align-middle">
            <thead class="table-success">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price (&#8377;)</th>
                    <th>Stock</th>
                    <th>Available</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product, stat : ${products}">
                    <td th:text="${stat.count}"></td>
                    <td>
                        <strong th:text="${product.name}"></strong>
                        <div class="text-muted small" th:text="${product.description}"></div>
                    </td>
                    <td th:text="${product.category != null ? product.category : '—'}"></td>
                    <td th:text="${product.price}"></td>
                    <td th:text="${product.stockQuantity}"></td>
                    <td>
                        <span th:if="${product.available}"  class="badge bg-success">Yes</span>
                        <span th:unless="${product.available}" class="badge bg-secondary">No</span>
                    </td>
                    <td>
                        <a th:href="@{/seller/products/edit/{id}(id=${product.id})}"
                           class="btn btn-sm btn-warning me-1">Edit</a>

                        <form th:action="@{/seller/products/delete/{id}(id=${product.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Delete this product?')">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
