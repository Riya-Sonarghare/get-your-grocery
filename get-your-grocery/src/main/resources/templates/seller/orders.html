<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Orders Received - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h4 class="mb-3">Orders Received</h4>

    <!-- Flash messages -->
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${param.success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty state -->
    <div th:if="${orders.empty}" class="alert alert-info">
        No orders received yet.
    </div>

    <!-- Orders table -->
    <div th:if="${!orders.empty}" class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-success">
                <tr>
                    <th>#</th>
                    <th>Buyer Username</th>
                    <th>Contact Number</th>
                    <th>Delivery Address</th>
                    <th>Ordered Item</th>
                    <th>Quantity</th>
                    <th>Total Price (&#8377;)</th>
                    <th>Order Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order, stat : ${orders}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${order.customerUsername}"></td>
                    <td th:text="${order.contactNumber}"></td>
                    <td th:text="${order.deliveryAddress}"></td>
                    <td th:text="${order.product.name}"></td>
                    <td th:text="${order.quantity}"></td>
                    <td th:text="${order.totalPrice}"></td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
                    <td>
                        <span th:if="${order.status.name() == 'DELIVERED'}"
                              class="badge bg-success">Delivered</span>
                        <span th:if="${order.status.name() == 'PENDING'}"
                              class="badge bg-warning text-dark">Pending</span>
                    </td>
                    <td>
                        <!-- Show button only for PENDING orders -->
                        <form th:if="${order.status.name() == 'PENDING'}"
                              th:action="@{/seller/orders/{id}/deliver(id=${order.id})}"
                              method="post">
                            <button type="submit" class="btn btn-sm btn-success">
                                Initiate Delivery
                            </button>
                        </form>
                        <span th:if="${order.status.name() == 'DELIVERED'}"
                              class="text-muted small">Completed</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
