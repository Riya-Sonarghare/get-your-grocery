<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Login - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-8">

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white text-center py-3">
                    <h4 class="mb-0">&#128722; GetYourGrocery</h4>
                    <small>Sign in to your account</small>
                </div>

                <div class="card-body p-4">

                    <!-- Registered success message -->
                    <div th:if="${param.registered}" class="alert alert-success">
                        Registration successful! Please log in.
                    </div>

                    <!-- Logout message -->
                    <div th:if="${param.logout}" class="alert alert-info">
                        You have been logged out.
                    </div>

                    <!-- Error message -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Enter username" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Enter password" required/>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Login</button>
                    </form>

                    <hr/>
                    <p class="text-center mb-0">
                        Don't have an account?
                        <a th:href="@{/register}" class="text-success fw-semibold">Register here</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
