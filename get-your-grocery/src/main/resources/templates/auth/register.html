<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Register - GetYourGrocery</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-sm-9">

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white text-center py-3">
                    <h4 class="mb-0">&#128722; GetYourGrocery</h4>
                    <small>Create a new account</small>
                </div>

                <div class="card-body p-4">

                    <!-- Error message -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form method="post" th:action="@{/register}" th:object="${userDto}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{username}" class="form-control"
                                   placeholder="Choose a username" required autofocus/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   placeholder="Choose a password" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   placeholder="Enter email address" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Address</label>
                            <input type="text" th:field="*{address}" class="form-control"
                                   placeholder="Your delivery address"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contact Number</label>
                            <input type="text" th:field="*{contactNumber}" class="form-control"
                                   placeholder="Your phone number"/>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Register As <span class="text-danger">*</span></label>
                            <select th:field="*{role}" class="form-select" required>
                                <option value="">-- Select Role --</option>
                                <option th:each="r : ${roles}"
                                        th:value="${r}"
                                        th:text="${r}">
                                </option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Create Account</button>
                    </form>

                    <hr/>
                    <p class="text-center mb-0">
                        Already have an account?
                        <a th:href="@{/login}" class="text-success fw-semibold">Login here</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
